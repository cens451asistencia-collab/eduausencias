function cargar() {
  // Leer DB actual del localStorage
  const raw = localStorage.getItem('eduausencias_db');
  const db = raw ? JSON.parse(raw) : { docentes: [], ausencias: [], suplencias: [] };
  if (!db.docentes) db.docentes = [];

  let agregados = 0;
  let duplicados = 0;

  DOCENTES_NUEVOS.forEach(d => {
    const existe = db.docentes.find(x => x.cuil === d.cuil);
    if (existe) {
      duplicados++;
    } else {
      db.docentes.push(d);
      agregados++;
    }
  });

  // Guardar en localStorage
  localStorage.setItem('eduausencias_db', JSON.stringify(db));

  // Sincronizar con Drive/Sheets
  if (WEB_APP_URL && !WEB_APP_URL.startsWith('PEGAR')) {
    const encoded = encodeURIComponent(JSON.stringify(db));
    fetch(WEB_APP_URL + '?action=save&data=' + encoded, { method: 'GET', mode: 'no-cors' })
      .then(() => {
        document.getElementById('res-warn').style.display = 'block';
        document.getElementById('res-warn').textContent = '↑ Sincronizando con Google Sheets…';
      });
  }

  document.getElementById('res-ok').style.display = 'block';
  document.getElementById('res-ok').textContent = 
    `✓ ${agregados} docentes cargados correctamente.${duplicados ? ' ' + duplicados + ' ya existían (omitidos).' : ''} Ya podés cerrar esta ventana y abrir EduAusencias.`;
}
